url: https://pauloguimaraes871.github.io/factoRverse/

template:
  bootstrap: 5

reference:
- title: Data structures & meta objects
  desc: >
    The self-documenting S4 containers at the heart of the package. `meta_dataframe`
    (long panels) and `meta_xts` (wide time series) carry a workflow log, metadata,
    and structural validation, and specialise into the objects each workflow consumes
    and produces.
  contents:
  - create_meta_dataframe
  - create_meta_xts
  - update_meta_dataframe
  - is_meta_dataframe
  - is_coercible_to_meta_dataframe
  - get_data
  - get_workflow
  - get_dates
  - get_tickers
  - "meta_dataframe-class"
  - "meta_xts-class"
  - "returns_meta_xts-class"
  - "metrics_meta_xts-class"
  - "raw_features_m_df-class"
  - "signals_m_df-class"
  - "groups_m_df-class"
  - "weights_m_df-class"
  - "stock_universe_m_df-class"
  - "oos_sb_outputs_m_df-class"
  - "feature_importance_m_df-class"

- title: Tickers catalog & survivorship
  desc: >
    Track ticker lifecycle events (listings, delistings, renames) with stable
    permanent identifiers, and build a survivorship-aware panel.
  contents:
  - create_tickers_catalog
  - update_tickers_catalog
  - read_tickers_catalog
  - lookup_catalog
  - "tickers_catalog-class"

- title: Feature engineering & targets
  desc: >
    Construct point-in-time characteristics from the factor-zoo literature
    (rolling and seasonal windows, formulas, composite scores, sector-wise metrics,
    cross-sectional / time-series combinations, sector-specific mappings), and build
    forward, risk-adjusted prediction targets.
  contents:
  - compute_window
  - compute_formula
  - compute_score
  - compute_across
  - compute_sector_wise
  - compute_sector_map
  - compute_sector_map_across
  - create_target_m_df
  - "target_m_df-class"

- title: Signal & statistic primitives
  desc: >
    The low-level building blocks used by the `compute_*` functions and the
    portfolio engine: benchmark regressions, momentum / volatility statistics, and
    signal transformation.
  contents:
  - alpha_bench
  - alpha_tstat_bench
  - beta_bench
  - correlation_bench
  - res_mom
  - idio_vol
  - skew
  - sur
  - cagr
  - geometric_mean_return
  - count_if
  - signal_transform
  - relative_risk_contribution

- title: Point-in-time preprocessing
  desc: >
    Apply a `recipes` preprocessing pipeline one date at a time so no future
    information leaks into the past, plus custom recipe steps for winsorization and
    sector-mean imputation.
  contents:
  - map_recipe_timewise
  - step_winsorize
  - step_impute_sector
  - step_winsorize_new
  - step_impute_sector_new
  - required_pkgs.step_winsorize
  - required_pkgs.step_impute_sector
  - bake.step_winsorize
  - bake.step_impute_sector
  - prep.step_winsorize
  - prep.step_impute_sector
  - tidy.step_winsorize
  - tidy.step_impute_sector
  - print.step_winsorize
  - print.step_impute_sector

- title: Screening
  desc: Filter the investable universe by feature values, logical conditions, or liquidity.
  contents:
  - screen_by_feature
  - "screen_by_feature,meta_dataframe-method"
  - screen_by_conditions
  - "screen_by_conditions,meta_dataframe-method"
  - screen_by_liquidity

- title: "Workflow 1: Characteristic-portfolio backtesting"
  desc: >
    Rank stocks on a characteristic, invest in the top quantile, and backtest the
    resulting long-only portfolio. Aggregate many backtests into a cohort to compare
    them as a group.
  contents:
  - create_port_backtest_config
  - run_port_backtest
  - update_port_backtest
  - create_port_backtest_cohort
  - "port_backtest_config-class"
  - "port_backtest_results-class"
  - "port_backtest_cohort-class"

- title: Constraints, liquidity & transaction costs
  desc: >
    Composable policy builders attached to a config with `add_*()`: liquidity floors
    and caps, turnover buffers, concentration limits, covariance estimation, and a
    BARRA-style transaction-cost model.
  contents:
  - add_liquidity_floor_cutoffs
  - create_liquidity_floor_cutoffs
  - get_liquidity_floor_cutoffs
  - add_liquidity_constraint_policy
  - create_liquidity_constraint_policy
  - get_liquidity_constraint_policy
  - add_turnover_constraint_policy
