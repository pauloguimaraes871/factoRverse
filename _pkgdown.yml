  - "signal_universe_m_df-class"
  - "priors_m_df-class"

- title: "Workflow 3: Signal blending & machine learning"
  desc: >
    Combine the selected signals into one score per stock via heuristics
    (equal / signal-weighted, risk parity, HRP, MVO) or ML (`glmnet`, `ranger`,
    `xgboost`, `keras`) behind a single tuning and walk-forward interface, then stack
    blenders into meta-ensembles and interpret predictions.
