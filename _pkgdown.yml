  - "mvo_parameters-class"
  - "mmaf_parameters-class"
  - "mmaf_sub_port_config-class"

- title: "Workflow 2: Signal selection (the factor zoo)"
  desc: >
    Walk-forward inference on CAPM alpha with multiple-testing control (frequentist
    FWER / FDR) or hierarchical Bayesian partial pooling within themes, to decide
    which signals enter the portfolio.
  contents:
  - create_ss_backtest_config
  - run_ss_backtest
  - update_ss_backtest
  - add_alpha_test_strategy
