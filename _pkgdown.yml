  - "concentration_constraint_policy-class"
  - "transaction_costs_parameters-class"
  - "cov_est_method-class"
  - "transactions_log-class"

- title: Portfolio construction methods
  desc: >
    Weighting schemes from equal-weight to risk parity, hierarchical risk parity,
    mean-variance optimization (with resampling), and the micro-macro allocation
    framework, plus universe classification and trade generation.
  contents:
  - set_portfolio_weights
  - create_hrp_portfolio
  - create_mvo_portfolio
  - create_resampled_mvo_portfolio
  - create_mmaf_portfolio
  - classify_investment_universe
