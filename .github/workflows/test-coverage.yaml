name: test-coverage

# Measures test coverage against the pinned renv lockfile and uploads it to
# Codecov. Mirrors the R-CMD-check environment (same R version, system libs,
# renv restore) and installs covr as a driver, since covr is a dev tool and is
# deliberately absent from renv.lock.
#
# Note: tests guarded by skip_if_no_tensorflow()/skip_if_no_stan() are skipped
# here (no Python/Stan backends on the runner), so the reported coverage is of
# everything runnable without the ML/Bayesian backends and reads lower than a
# full local run.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true

      - name: Install system libraries for source builds
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coinor-libsymphony-dev \
            libglpk-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev

      - name: Set up renv and restore
        uses: r-lib/actions/setup-renv@v2

      # covr and xml2 are check/coverage drivers, deliberately absent from
      # renv.lock. xml2 is a Suggests of testthat/waldo that the test suite
      # loads lazily; the R-CMD-check job gets it for free as a transitive
      # dependency of rcmdcheck, but the covr driver does not pull it in.
      - name: Install coverage driver (covr)
        run: renv::install(c("covr", "xml2"))
        shell: Rscript {0}

      # .covrignore excludes visualization/display code (plot/print/summary
      # methods) and the Keras backend file: the former is not meaningfully
      # unit-testable and the latter cannot run without a Python/TensorFlow
      # backend on the runner. The reported figure is therefore coverage of the
      # analytical surface, not of the display layer.
      - name: Measure coverage
        run: |
          cov <- covr::package_coverage(quiet = FALSE, clean = FALSE)
          covr::to_cobertura(cov, filename = "cobertura.xml")
          print(cov)
        shell: Rscript {0}

      # covr runs the tests in a subprocess that writes to testthat.Rout; on a
      # test failure the console only shows the wrapper error, not the cause.
      # clean = FALSE above preserves the renamed .fail file, so surface its
      # tail here to make failing runs self-documenting.
      - name: Show testthat failure log
        if: failure()
        run: |
          f=$(find /tmp -name 'testthat.Rout.fail' 2>/dev/null | head -1 || true)
          if [ -n "$f" ]; then
            echo "== $f =="
            tail -n 120 "$f"
          else
            echo "no testthat.Rout.fail found under /tmp"
          fi
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
