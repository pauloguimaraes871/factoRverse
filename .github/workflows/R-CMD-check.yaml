name: R CMD check with renv

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-latest
          - os: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set RENV_PATHS_ROOT
        shell: bash
        run: echo "RENV_PATHS_ROOT=${{ runner.temp }}/renv" >> $GITHUB_ENV

      - name: Install renv and activate
        run: |
          install.packages("renv")
          renv::activate()
        shell: Rscript {0}

      - name: Get R and OS version
        id: get-version
        run: |
          gh_out <- Sys.getenv("GITHUB_OUTPUT")
          cat("os-version=", sessionInfo()$running, "\n", sep = "", file = gh_out, append = TRUE)
          cat("r-version=", as.character(getRversion()), "\n", sep = "", file = gh_out, append = TRUE)
        shell: Rscript {0}

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ runner.os }}-${{ steps.get-version.outputs.r-version }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.get-version.outputs.r-version }}-

      - name: Restore dependencies
        run: renv::restore()
        shell: Rscript {0}

      - name: Run R CMD check
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          devtools::check(args = c("--no-manual", "--as-cran"), error_on = "error")
        shell: Rscript {0}
