name: R CMD check with renv

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-latest
          - os: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'          # match renv.lock (R 4.3.0); bump only with the lock
          use-public-rspm: true

      # Two source-built dependencies need system libraries that are not
      # preinstalled on the Ubuntu runner:
      #   - Rsymphony (via PortfolioAnalytics -> ROI.plugin.symphony) links the
      #     COIN-OR SYMPHONY C library (coinor-libsymphony-dev).
      #   - igraph (via the igraph/ggraph Suggests) links GLPK, i.e.
      #     libglpk.so.40 (libglpk-dev).
      # Windows installs prebuilt binaries that bundle these, so this is Linux-only.
      - name: Install system libraries for source builds (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y coinor-libsymphony-dev libglpk-dev

      - name: Set up renv and restore (installs the lockfile's renv 1.1.4)
        uses: r-lib/actions/setup-renv@v2

      - name: Run R CMD check
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          devtools::check(args = c("--no-manual", "--as-cran"), error_on = "error")
        shell: Rscript {0}
