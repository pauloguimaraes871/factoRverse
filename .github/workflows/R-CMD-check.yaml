# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
# .github/workflows/R-CMD-check.yaml
name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest,   r: 'release' }
          - { os: windows-latest, r: 'release' }
          - { os: ubuntu-latest,  r: 'devel',      http-user-agent: 'release' }
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'oldrel-1' }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:

      - uses: actions/checkout@v4


      - uses: r-lib/actions/setup-pandoc@v2


      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true


      - name: Set CRAN mirror
        run: echo "options(repos = c(CRAN='https://cran.r-project.org'))" >> ~/.Rprofile


      - name: Force CRAN for renv restores
        run: |
          echo 'options(repos = c(CRAN="https://cran.r-project.org"))' >> ~/.Rprofile
          echo 'options(renv.config.repos.override = c(CRAN="https://cran.r-project.org"))' >> ~/.Rprofile


      - uses: r-lib/actions/setup-renv@v2


      - name: Install system libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libcurl4-openssl-dev libxml2-dev


      - name: Install BH, rstan, brms
        shell: Rscript {0}
        run: |
          install.packages(
            c("BH", "StanHeaders", "rstan", "brms"),
            repos = "https://cran.r-project.org"
          )


      - name: Install TensorFlow runtime
        shell: Rscript {0}
        run: |
          install.packages("tensorflow")
          tensorflow::install_tensorflow(
            method = "virtualenv",
            version = "2.15.0",
            extra_packages = c("keras")
          )


      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
