name: R CMD check with renv

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    # Authenticate GitHub API calls (e.g. renv resolving the DESCRIPTION
    # Remotes field); unauthenticated runners share exhausted rate limits.
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-latest
          - os: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'        # exact match to renv.lock; a floating '4.3' lets
                                    # patch releases drift CI's numerical/deprecation
                                    # behavior away from the tested environment
          use-public-rspm: true

      # Pandoc is needed to (re)build vignettes/rmarkdown docs during --as-cran.
      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      # Source-built dependencies need system libraries not preinstalled on the
      # Ubuntu runner (renv restore builds from source on Linux):
      #   - Rsymphony (via PortfolioAnalytics -> ROI.plugin.symphony): SYMPHONY
      #   - igraph (via igraph/ggraph): GLPK (libglpk.so.40)
      #   - systemfonts/textshaping/png: fontconfig / harfbuzz / png headers
      # Windows installs prebuilt binaries that bundle these, so this is Linux-only.
      - name: Install system libraries for source builds (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coinor-libsymphony-dev \
            libglpk-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev

      - name: Set up renv and restore (installs the lockfile's renv 1.1.4)
        uses: r-lib/actions/setup-renv@v2

      # rcmdcheck is the check *driver*, not a package dependency, so it is
      # deliberately absent from renv.lock. Install it into the ephemeral CI
      # library only; do NOT snapshot it back into the lock.
      - name: Install check driver (rcmdcheck)
        run: renv::install("rcmdcheck")
        shell: Rscript {0}

      - name: Run R CMD check
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--as-cran"),
            error_on = "error"
          )
        shell: Rscript {0}
