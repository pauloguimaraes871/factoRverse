# .github/workflows/R-CMD-check.yaml
name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest,   r: 'release' }
          - { os: windows-latest, r: 'release' }
          - { os: ubuntu-latest,  r: 'devel',      http-user-agent: 'release' }
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'oldrel-1' }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      # 1. Check out your code
      - uses: actions/checkout@v4

      # 2. Install pandoc (for vignettes)
      - uses: r-lib/actions/setup-pandoc@v2

      # 3. Install the right R version
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # 4. On Linux, install system libs needed by rstan/brms
      - name: Install system libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libcurl4-openssl-dev libxml2-dev

      # 5. Restore your renv library (and cache it)
      - uses: r-lib/actions/setup-renv@v2

      # 6. Install TensorFlow + Keras (needed for keras tests)
      - name: Install TensorFlow runtime
        shell: Rscript {0}
        run: |
          install.packages("tensorflow")
          tensorflow::install_tensorflow(
            method = "virtualenv",
            version = "2.15.0",
            extra_packages = c("keras")
          )

      # 7. Finally, run R CMD check (with snapshot uploads & vignette compaction)
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'


